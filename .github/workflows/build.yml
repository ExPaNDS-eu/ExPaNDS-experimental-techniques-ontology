name: panet-build

on:
  push:
    branches: [ '*' ]
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate PaNET_metadata.ttl
        uses: vemonet/jena-riot-action@v3.14
        with:
          input: source/PaNET_metadata.ttl

        # Robot `template` doesn't fail on git conflict markers, see:
        #   https://github.com/ontodev/robot/issues/1279
        #
        # In order to catch these problems, we test for such markers
        # explicitly.
      - name: Merge Conflict finder
        uses: olivernybroe/action-conflict-finder@v4.0

  build-panet:
    runs-on: ubuntu-latest
    container:
      image: gitlab.desy.de:5555/paul.millar/panet-build:v0.13

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to identify non-tagged builds

      - name: Work-around for broken support for safe.directory
        run: /usr/bin/git config --global --add safe.directory `pwd`

      - name: Build PaNET and documentation
        run: /bin/build-panet -d -s

      - name: Archive generated PaNET
        uses: actions/upload-artifact@v4
        with:
          name: PaNET
          path: |
            source/PaNET.owl
            source/PaNET_reasoned.owl
          retention-days: 7

      - name: Upload documentation as (plain) artifact
        uses: actions/upload-artifact@v4
        with:
          name: widoco-pages
          path: site/
          retention-days: 7

  build-webpage:
    runs-on: ubuntu-latest
    needs: build-panet
    steps:
      - name: Checkout PaNET
        uses: actions/checkout@v4

      - name: Download Widoco documentation
        uses: actions/download-artifact@v8
        with:
          name: widoco-pages
          path: widoco_site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs
          destination: jekyll_site

      # NB. jekyll-build-pages generates files owned by root, so we can't
      # simply copy the Widoco pages into the destination as user `runner`
      # doesn't have permissions.  Therefore, we build a `site` directory
      # and copy content into that directory.
      - run: mkdir site
      - run: cp -r widoco_site/* site
      # NB. We need to copy jekyll-generated content *after* copying the
      # content of the `widoco-pages` artefact, as work-around.  The
      # `widoco-pages` artefact contains various (non-Widoco-generated) files
      # with the same filename as the Jekyll-generated files.  See:
      # https://gitlab.desy.de/paul.millar/panet-build/-/work_items/5
      - run: cp -r jekyll_site/* site

      - name: Upload complete website
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # From naming convention on above tag selection, tags
    # only trigger the workflow if they are releases.
    #if: ${{ github.ref_type == 'tag' }}
    needs: build-webpage

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
